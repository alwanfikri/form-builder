version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://formbuilder:${DB_PASSWORD}@db:5432/formbuilder
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      MS_CLIENT_ID: ${MS_CLIENT_ID}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      MS_TENANT_ID: ${MS_TENANT_ID}
      MS_CALLBACK_URL: ${MS_CALLBACK_URL}
      COMPANY_DOMAIN: ${COMPANY_DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      EXT_SESSION_SECRET: ${EXT_SESSION_SECRET}
      FORMS_ROOT_FOLDER_ID: ${FORMS_ROOT_FOLDER_ID}
      SHAREPOINT_DRIVE_ID: ${SHAREPOINT_DRIVE_ID}
      INTERNAL_GROUP_EMAIL: ${INTERNAL_GROUP_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose:
      - "80"
    depends_on:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
      - web
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: formbuilder
      POSTGRES_USER: formbuilder
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formbuilder"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
