worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=shortlink_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream api {
        server app:3000;
    }

    upstream frontend {
        server web:80;
    }

    server {
        listen 80;
        server_name _;

        # --- Shortlinks (public, rate-limited) ---
        location /s/ {
            limit_req zone=shortlink_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Auth endpoints ---
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Internal API (JWT-protected) ---
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Dashboard (requires internal auth) ---
        location /dashboard/ {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Frontend (SPA catch-all) ---
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
